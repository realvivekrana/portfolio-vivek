<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ecommerceBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#ecommerceBg)"/>
  
  <!-- Shopping Cart Icon -->
  <circle cx="150" cy="120" r="60" fill="#ffffff" opacity="0.9"/>
  <text x="150" y="140" font-family="Arial" font-size="50" text-anchor="middle">🛒</text>
  
  <!-- Product Cards -->
  <rect x="50" y="220" width="200" height="250" rx="15" fill="#ffffff" opacity="0.9"/>
  <rect x="70" y="240" width="160" height="120" rx="10" fill="#f5576c" opacity="0.3"/>
  <rect x="70" y="375" width="100" height="15" rx="5" fill="#64748b" opacity="0.3"/>
  <rect x="70" y="400" width="160" height="30" rx="8" fill="#f5576c" opacity="0.8"/>
  
  <rect x="300" y="220" width="200" height="250" rx="15" fill="#ffffff" opacity="0.9"/>
  <rect x="320" y="240" width="160" height="120" rx="10" fill="#f5576c" opacity="0.3"/>
  <rect x="320" y="375" width="100" height="15" rx="5" fill="#64748b" opacity="0.3"/>
  <rect x="320" y="400" width="160" height="30" rx="8" fill="#f5576c" opacity="0.8"/>
  
  <rect x="550" y="220" width="200" height="250" rx="15" fill="#ffffff" opacity="0.9"/>
  <rect x="570" y="240" width="160" height="120" rx="10" fill="#f5576c" opacity="0.3"/>
  <rect x="570" y="375" width="100" height="15" rx="5" fill="#64748b" opacity="0.3"/>
  <rect x="570" y="400" width="160" height="30" rx="8" fill="#f5576c" opacity="0.8"/>
  
  <!-- Payment Icons -->
  <circle cx="650" cy="120" r="35" fill="#ffffff" opacity="0.9"/>
  <text x="650" y="135" font-family="Arial" font-size="30" text-anchor="middle">💳</text>
  
  <!-- Title -->
  <text x="400" y="550" font-family="Arial" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">E-Commerce Platform</text>
</svg>
