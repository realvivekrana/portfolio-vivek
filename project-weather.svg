<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="weatherBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#56ccf2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2f80ed;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#weatherBg)"/>
  
  <!-- Sun -->
  <circle cx="200" cy="150" r="50" fill="#fbbf24" opacity="0.9"/>
  
  <!-- Temperature Card -->
  <rect x="300" y="100" width="200" height="150" rx="15" fill="#ffffff" opacity="0.9"/>
  <text x="400" y="160" font-family="Arial" font-size="48" font-weight="bold" fill="#2f80ed" text-anchor="middle">24°C</text>
  <text x="400" y="200" font-family="Arial" font-size="18" fill="#64748b" text-anchor="middle">Sunny</text>
  
  <!-- Forecast Cards -->
  <rect x="100" y="300" width="150" height="120" rx="10" fill="#ffffff" opacity="0.8"/>
  <rect x="280" y="300" width="150" height="120" rx="10" fill="#ffffff" opacity="0.8"/>
  <rect x="460" y="300" width="150" height="120" rx="10" fill="#ffffff" opacity="0.8"/>
  
  <!-- Weather Icons -->
  <text x="175" y="350" font-family="Arial" font-size="32" text-anchor="middle">☀️</text>
  <text x="355" y="350" font-family="Arial" font-size="32" text-anchor="middle">⛅</text>
  <text x="535" y="350" font-family="Arial" font-size="32" text-anchor="middle">🌧️</text>
  
  <!-- Title -->
  <text x="400" y="550" font-family="Arial" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Sunny Skies Weather</text>
</svg>
