<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chatBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#chatBg)"/>
  
  <!-- Chat bubbles -->
  <rect x="50" y="80" width="300" height="60" rx="20" fill="#ffffff" opacity="0.9"/>
  <rect x="450" y="160" width="300" height="60" rx="20" fill="#4ade80" opacity="0.9"/>
  <rect x="50" y="240" width="350" height="80" rx="20" fill="#ffffff" opacity="0.9"/>
  <rect x="400" y="340" width="350" height="60" rx="20" fill="#4ade80" opacity="0.9"/>
  
  <!-- AI Icon -->
  <circle cx="400" cy="480" r="40" fill="#ffffff" opacity="0.2"/>
  <text x="400" y="495" font-family="Arial" font-size="40" fill="#ffffff" text-anchor="middle">🤖</text>
  
  <!-- Title -->
  <text x="400" y="550" font-family="Arial" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">ChatMate AI Assistant</text>
</svg>
